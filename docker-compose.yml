services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spatial_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spatial_frontend
    ports:
      - "3000:3000"
    environment:
      - FRONTEND_PORT=3000
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: always
